name: 'Setup Oratos'
description: 'Install the Oratos CLI from GitHub Releases (no Rust required)'
inputs:
  version:
    description: 'Oratos version (e.g. 0.3.1 or v0.3.1). Empty = latest release.'
    required: false
    default: ''
  token:
    description: 'GitHub token for API rate limits'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - name: Resolve version and platform
      id: meta
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        VERSION="${INPUT_VERSION}"
        if [[ -z "${VERSION}" ]]; then
          VERSION="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/latentmeta/oratos/releases/latest \
            | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        case "${VERSION}" in
          v*) ;;
          *) VERSION="v${VERSION}" ;;
        esac
        echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

        OS="${RUNNER_OS}"
        ARCH="${RUNNER_ARCH}"
        case "${OS}" in
          Linux) platform_os=linux ;;
          macOS) platform_os=macos ;;
          Windows) platform_os=windows ;;
          *) echo "unsupported OS ${OS}" >&2; exit 1 ;;
        esac
        case "${ARCH}" in
          X64) platform_arch=x86_64 ;;
          ARM64) platform_arch=aarch64 ;;
          *) echo "unsupported arch ${ARCH}" >&2; exit 1 ;;
        esac
        echo "platform=${platform_os}-${platform_arch}" >> "${GITHUB_OUTPUT}"
        if [[ "${platform_os}" == "windows" ]]; then
          echo "ext=zip" >> "${GITHUB_OUTPUT}"
          echo "bin=oratos.exe" >> "${GITHUB_OUTPUT}"
        else
          echo "ext=tar.gz" >> "${GITHUB_OUTPUT}"
          echo "bin=oratos" >> "${GITHUB_OUTPUT}"
        fi

    - name: Download and install
      shell: bash
      env:
        VERSION: ${{ steps.meta.outputs.version }}
        PLATFORM: ${{ steps.meta.outputs.platform }}
        EXT: ${{ steps.meta.outputs.ext }}
        BIN: ${{ steps.meta.outputs.bin }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        ARCHIVE="oratos-${VERSION}-${PLATFORM}.${EXT}"
        URL="https://github.com/latentmeta/oratos/releases/download/${VERSION}/${ARCHIVE}"
        DEST="${RUNNER_TEMP}/oratos-install"
        mkdir -p "${DEST}"
        curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -L "${URL}" -o "${DEST}/${ARCHIVE}"
        cd "${DEST}"
        if [[ "${EXT}" == "zip" ]]; then
          unzip -qo "${ARCHIVE}"
        else
          tar -xzf "${ARCHIVE}"
        fi
        chmod +x "${BIN}" || true
        mkdir -p "${HOME}/.local/bin"
        cp "${BIN}" "${HOME}/.local/bin/${BIN}"
        echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
        "${HOME}/.local/bin/${BIN}" --version
